<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="shortcut icon" href="./favicon.png" type="image/x-icon">
        <script src="https://cdn.tailwindcss.com"></script>
        <title>Leo's Emporium</title>
    </head>
    <body class="font-mono bg-slate-500">
        <div class="text-center">
            <h1 class="text-2xl font-bold p-[3%] bg-slate-600 text-white">Leo's Emporium</h1>
            <p>Buy shiny rocks 🗿</p>
        </div>
        <div class="px-[7%] py-[3%] bg-white">
            <div class="flex">
                <img src="shiny-rock-image-2.jpg" alt="Shiny rock image" class="w-[25%] rounded-[5%]">
                <p class="text-center w-[50%] px-auto text-xl self-center">
                    Miscellaneous rocks - <b>5p</b>
                    <br>
                    Fossils - <b>50p-£5</b>
                </p>
                <img src="./random-rock-image-1.jpg" alt="Random rock image" class="w-[25%] rounded-[5%]">
            </div>
            <div class="grid grid-cols-2 mt-[3%]">
                <div>
                    <p class="flex items-center w-[200%] bg-slate-500 hover:bg-slate-600 text-white mr-[3%] rounded-lg p-1 my-1">
                        <img src="./small-rock-image.jpg" alt="Small rock image" class="w-[75px] rounded-[5%]"> <b class="ml-[1%]">10p-25p&nbsp</b> for small rocks
                    </p>
                    <p class="flex items-center w-[200%] bg-slate-500 hover:bg-slate-600 text-white mr-[3%] rounded-lg p-1 my-1">
                        <img src="./medium-rock-image.jpg" alt="Medium rock image" class="w-[75px] rounded-[5%]"> <b class="ml-[1%]">50p-£1&nbsp</b> for medium rocks
                    </p>
                    <p class="flex items-center w-[200%] bg-slate-500 hover:bg-slate-600 text-white mr-[3%] rounded-lg p-1 my-1">
                        <img src="./large-rock-image.jpg" alt="Large rock image" class="w-[75px] rounded-[5%]"> <b class="ml-[1%]">£1-£3&nbsp</b> for large rocks
                    </p>
                    <p class="flex items-center w-[200%] bg-slate-500 hover:bg-slate-600 text-white mr-[3%] rounded-lg p-1 my-1">
                        <img src="./extra-large-rock-image.jpg" alt="Extra-large rock image" class="w-[75px] rounded-[5%]"> <b class="ml-[1%]">£3-£10&nbsp</b> for extra large rocks
                    </p>
                </div>
            </div>
        </div>
        <div class="bg-slate-500 hover:bg-slate-600 text-white p-1 my-1 flex">
            <div class="text-center w-[50%] mx-auto">
                <h1 class="text-xl font-bold">Contact me!</h1>
                <p>
                    <!-- Add personal info -->
                    Email: example@gmail.com
                    <br>
                    Tel: 123 456 7890
                </p>
            </div>
            <img src="shiny-rock-image-1.jpg" alt="Shiny rock image" class="h-[100%] rounded-[5%] ml-auto">
        </div>
    </body>
</html>
